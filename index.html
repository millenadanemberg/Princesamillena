<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cápsula do Tempo da Princesa Millena</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Baloo 2',cursive;
background:linear-gradient(180deg,#ffe4ef,#fff5c9);
padding:20px;
}

.card{
background:white;
border-radius:30px;
padding:25px;
max-width:700px;
margin:auto;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
color:#ff4fa3;
font-size:42px;
margin-bottom:10px;
}

.sub{
font-size:22px;
color:#8d6e63;
}

.foto{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:8px solid #ffb6d9;
margin-bottom:20px;
}

.info{
font-size:24px;
color:#555;
}

.contador{
background:#fff0f7;
padding:15px;
border-radius:20px;
margin-top:20px;
font-size:22px;
color:#ff4fa3;
font-weight:bold;
}

.mensagem{
margin-top:30px;
background:#fff9e8;
padding:25px;
border-radius:25px;
}

input,textarea{
width:100%;
padding:15px;
border-radius:15px;
border:2px solid #ffd16e;
margin-top:10px;
font-size:18px;
box-sizing:border-box;
}

button{
margin-top:15px;
width:100%;
padding:15px;
background:#ff4fa3;
color:white;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<img src="https://images.unsplash.com/photo-1515488042361-ee00e0ddd4e4?w=500" class="foto">

<h1>🦒🌸 Princesa Millena 🌸🦒</h1>

<div class="sub">
Bem-vindo à Cápsula do Tempo da Millena 💖
</div>

<p class="info">
Aqui guardamos mensagens, lembranças e muito amor para que ela leia no futuro.
</p>

<div class="contador">
👑 Nascimento: 18/09/2019
</div>

<div class="mensagem">
<h2>💌 Deixe uma mensagem</h2>

<input placeholder="Seu nome">

<textarea rows="5" placeholder="Escreva uma mensagem para a Millena"></textarea>

<button>Enviar Mensagem</button>
</div>

</div>

</body>
</html>
